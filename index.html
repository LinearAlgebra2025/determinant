<meta charset="UTF-8">
<title>行列式几何意义可视化工具</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    flex-direction:column;
}

#canvasContainer{
    width:100%;
    height:60vh;
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    background:white;
    touch-action:none;
}

#info{
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
    font-size:16px;
}

.value{
    margin:6px 0;
}

button{
    padding:8px 12px;
    margin-top:10px;
    font-size:16px;
}
</style>
</head>
<body>

<div id="canvasContainer">
<canvas id="canvas"></canvas>
</div>

<div id="info">
<div class="value" id="matrixDisplay"></div>
<div class="value" id="detDisplay"></div>
<div class="value" id="areaDisplay"></div>
<div class="value" id="relationDisplay"></div>
<button onclick="resetVectors()">重置</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.6;
    origin = {x:canvas.width/2, y:canvas.height/2};
    scale = Math.min(canvas.width,canvas.height)/6;
    draw();
}
window.addEventListener("resize",resizeCanvas);

let origin = {x:0,y:0};
let scale = 60;

let v1 = {x:1,y:0};
let v2 = {x:0,y:1};

let dragging = null;

function getPosition(e){
    const rect = canvas.getBoundingClientRect();
    if(e.touches){
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    }else{
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }
}

function dist(a,b){
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function toCanvas(v){
    return {
        x: origin.x + v.x*scale,
        y: origin.y - v.y*scale
    };
}

function startDrag(e){
    const pos = getPosition(e);
    if(dist(pos,toCanvas(v1))<20) dragging="v1";
    else if(dist(pos,toCanvas(v2))<20) dragging="v2";
}

function moveDrag(e){
    if(!dragging) return;
    e.preventDefault();
    const pos = getPosition(e);
    const vx = (pos.x-origin.x)/scale;
    const vy = (origin.y-pos.y)/scale;
    if(dragging==="v1"){ v1.x=vx; v1.y=vy; }
    if(dragging==="v2"){ v2.x=vx; v2.y=vy; }
    draw();
}

function endDrag(){
    dragging=null;
}

canvas.addEventListener("mousedown",startDrag);
canvas.addEventListener("mousemove",moveDrag);
canvas.addEventListener("mouseup",endDrag);
canvas.addEventListener("mouseleave",endDrag);

canvas.addEventListener("touchstart",startDrag);
canvas.addEventListener("touchmove",moveDrag);
canvas.addEventListener("touchend",endDrag);

function drawAxes(){
    ctx.strokeStyle="#ccc";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(0,origin.y);
    ctx.lineTo(canvas.width,origin.y);
    ctx.moveTo(origin.x,0);
    ctx.lineTo(origin.x,canvas.height);
    ctx.stroke();
}

function drawVector(v,color){
    const end = toCanvas(v);
    ctx.strokeStyle=color;
    ctx.fillStyle=color;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(origin.x,origin.y);
    ctx.lineTo(end.x,end.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(end.x,end.y,10,0,Math.PI*2);
    ctx.fill();
}

function drawParallelogram(){
    const p1 = toCanvas(v1);
    const p2 = toCanvas(v2);
    const p3 = toCanvas({x:v1.x+v2.x, y:v1.y+v2.y});

    const det = v1.x*v2.y - v1.y*v2.x;

    if(det>0) ctx.fillStyle="rgba(0,200,0,0.3)";
    else if(det<0) ctx.fillStyle="rgba(200,0,0,0.3)";
    else ctx.fillStyle="rgba(150,150,150,0.3)";

    ctx.beginPath();
    ctx.moveTo(origin.x,origin.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p3.x,p3.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.closePath();
    ctx.fill();
}

function updateInfo(){
    const det = v1.x*v2.y - v1.y*v2.x;
    const area = Math.abs(det);

    document.getElementById("matrixDisplay").innerHTML =
    `A = [ ${v1.x.toFixed(2)} ${v2.x.toFixed(2)} ; 
           ${v1.y.toFixed(2)} ${v2.y.toFixed(2)} ]`;

    document.getElementById("detDisplay").innerHTML =
    `det(A) = ${det.toFixed(2)}`;

    document.getElementById("areaDisplay").innerHTML =
    `面积 = ${area.toFixed(2)}`;

    if(Math.abs(det)<0.0001){
        document.getElementById("relationDisplay").innerHTML =
        `<span style="color:red">向量线性相关（行列式为0）</span>`;
    }else{
        document.getElementById("relationDisplay").innerHTML =
        `|det(A)| = 面积 ✔`;
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();
    drawParallelogram();
    drawVector(v1,"blue");
    drawVector(v2,"orange");
    updateInfo();
}

function resetVectors(){
    v1={x:1,y:0};
    v2={x:0,y:1};
    draw();
}

resizeCanvas();
</script>

</body>
</html>
