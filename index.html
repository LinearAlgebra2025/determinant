<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>行列式几何意义可视化工具</title>
<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    margin:0;
}
#left{
    width:65%;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
}
#right{
    width:35%;
    padding:20px;
    background:white;
    border-left:1px solid #ddd;
}
canvas{
    background:white;
    border:1px solid #ccc;
}
button{
    padding:8px 12px;
    margin-top:10px;
    cursor:pointer;
}
.value{
    font-size:18px;
    margin:8px 0;
}
.highlight{
    font-weight:bold;
}
.zero{
    color:red;
}
</style>
</head>
<body>

<div id="left">
<canvas id="canvas" width="600" height="600"></canvas>
</div>

<div id="right">
<h2>矩阵与行列式</h2>

<div class="value" id="matrixDisplay"></div>
<div class="value highlight" id="detDisplay"></div>
<div class="value" id="areaDisplay"></div>
<div class="value" id="relationDisplay"></div>

<button onclick="resetVectors()">重置</button>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const origin = {x:300,y:300};
const scale = 60;

let v1 = {x:1,y:0};
let v2 = {x:0,y:1};

let dragging = null;

canvas.addEventListener("mousedown",function(e){
    const mouse = getMouse(e);
    if(dist(mouse,toCanvas(v1))<10) dragging="v1";
    else if(dist(mouse,toCanvas(v2))<10) dragging="v2";
});
canvas.addEventListener("mousemove",function(e){
    if(dragging){
        const mouse=getMouse(e);
        const vx=(mouse.x-origin.x)/scale;
        const vy=(origin.y-mouse.y)/scale;
        if(dragging==="v1"){v1.x=vx;v1.y=vy;}
        if(dragging==="v2"){v2.x=vx;v2.y=vy;}
        draw();
    }
});
canvas.addEventListener("mouseup",()=>dragging=null);
canvas.addEventListener("mouseleave",()=>dragging=null);

function getMouse(e){
    const rect=canvas.getBoundingClientRect();
    return {x:e.clientX-rect.left,y:e.clientY-rect.top};
}

function dist(a,b){
    return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
}

function toCanvas(v){
    return {
        x: origin.x + v.x*scale,
        y: origin.y - v.y*scale
    };
}

function drawAxes(){
    ctx.strokeStyle="#ccc";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(0,origin.y);
    ctx.lineTo(canvas.width,origin.y);
    ctx.moveTo(origin.x,0);
    ctx.lineTo(origin.x,canvas.height);
    ctx.stroke();
}

function drawVector(v,color){
    const end=toCanvas(v);
    ctx.strokeStyle=color;
    ctx.fillStyle=color;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(origin.x,origin.y);
    ctx.lineTo(end.x,end.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(end.x,end.y,6,0,Math.PI*2);
    ctx.fill();
}

function drawParallelogram(){
    const p1=toCanvas(v1);
    const p2=toCanvas(v2);
    const p3=toCanvas({x:v1.x+v2.x,y:v1.y+v2.y});

    const det = v1.x*v2.y - v1.y*v2.x;

    if(det>0) ctx.fillStyle="rgba(0,200,0,0.3)";
    else if(det<0) ctx.fillStyle="rgba(200,0,0,0.3)";
    else ctx.fillStyle="rgba(150,150,150,0.3)";

    ctx.beginPath();
    ctx.moveTo(origin.x,origin.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p3.x,p3.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.closePath();
    ctx.fill();
}

function updateInfo(){
    const det = v1.x*v2.y - v1.y*v2.x;
    const area = Math.abs(det);

    document.getElementById("matrixDisplay").innerHTML=
    `A = [ ${v1.x.toFixed(2)}  ${v2.x.toFixed(2)} ; 
           ${v1.y.toFixed(2)}  ${v2.y.toFixed(2)} ]`;

    document.getElementById("detDisplay").innerHTML=
    `det(A) = ${det.toFixed(2)}`;

    document.getElementById("areaDisplay").innerHTML=
    `平行四边形面积 = ${area.toFixed(2)}`;

    if(Math.abs(det)<0.0001){
        document.getElementById("relationDisplay").innerHTML=
        `<span class="zero">两个向量线性相关（行列式为0）</span>`;
    }else{
        document.getElementById("relationDisplay").innerHTML=
        `|det(A)| = 面积 ✔`;
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();
    drawParallelogram();
    drawVector(v1,"blue");
    drawVector(v2,"orange");
    updateInfo();
}

function resetVectors(){
    v1={x:1,y:0};
    v2={x:0,y:1};
    draw();
}

draw();
</script>

</body>
</html>
