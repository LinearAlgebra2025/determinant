<meta charset="UTF-8">
<title>行列式几何意义可视化工具</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
}

#canvasContainer{
    width:100%;
    height:60vh;
    background:#f0f0f0;
}

canvas{
    background:white;
    touch-action:none;
    display:block;
}

#panel{
    padding:12px;
    font-size:16px;
    background:white;
    border-top:1px solid #ddd;
}

.row{
    margin:6px 0;
}

input{
    width:60px;
    font-size:16px;
}

button{
    padding:6px 10px;
    margin-right:6px;
}

.selected{
    font-weight:bold;
    color:blue;
}

.valueBox{
    margin-top:8px;
    padding:8px;
    background:#f9f9f9;
    border:1px solid #ddd;
}
</style>
</head>
<body>

<div id="canvasContainer">
<canvas id="canvas"></canvas>
</div>

<div id="panel">

<div class="row">
当前编辑：
<button onclick="selectVector('v1')" id="btn1">v₁</button>
<button onclick="selectVector('v2')" id="btn2">v₂</button>
</div>

<div class="row">
v₁ = (
<input id="v1x" type="number" step="0.1"> ,
<input id="v1y" type="number" step="0.1">
)
</div>

<div class="row">
v₂ = (
<input id="v2x" type="number" step="0.1"> ,
<input id="v2y" type="number" step="0.1">
)
</div>

<div class="valueBox">
<div id="detValue"></div>
<div id="absDetValue"></div>
<div id="areaValue"></div>
<div id="relation"></div>
</div>

<button onclick="resetVectors()">重置</button>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let origin, scale;
let v1={x:1,y:0};
let v2={x:0,y:1};
let selected="v1";
let dragging=null;

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight*0.6;
    origin={x:canvas.width/2,y:canvas.height/2};
    scale=Math.min(canvas.width,canvas.height)/6;
    draw();
}
window.addEventListener("resize",resize);

function toCanvas(v){
    return {
        x:origin.x+v.x*scale,
        y:origin.y-v.y*scale
    };
}

function fromCanvas(p){
    return {
        x:(p.x-origin.x)/scale,
        y:(origin.y-p.y)/scale
    };
}

function drawAxes(){
    ctx.strokeStyle="#ccc";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(0,origin.y);
    ctx.lineTo(canvas.width,origin.y);
    ctx.moveTo(origin.x,0);
    ctx.lineTo(origin.x,canvas.height);
    ctx.stroke();
}

function drawVector(v,color){
    const end=toCanvas(v);
    ctx.strokeStyle=color;
    ctx.fillStyle=color;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(origin.x,origin.y);
    ctx.lineTo(end.x,end.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(end.x,end.y,10,0,Math.PI*2);
    ctx.fill();
}

function drawParallelogram(){
    const p1=toCanvas(v1);
    const p2=toCanvas(v2);
    const p3=toCanvas({x:v1.x+v2.x,y:v1.y+v2.y});
    const det=v1.x*v2.y-v1.y*v2.x;

    if(det>0) ctx.fillStyle="rgba(0,200,0,0.3)";
    else if(det<0) ctx.fillStyle="rgba(200,0,0,0.3)";
    else ctx.fillStyle="rgba(150,150,150,0.3)";

    ctx.beginPath();
    ctx.moveTo(origin.x,origin.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p3.x,p3.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.closePath();
    ctx.fill();
}

function updatePanel(){
    document.getElementById("v1x").value=v1.x.toFixed(2);
    document.getElementById("v1y").value=v1.y.toFixed(2);
    document.getElementById("v2x").value=v2.x.toFixed(2);
    document.getElementById("v2y").value=v2.y.toFixed(2);

    const det=v1.x*v2.y-v1.y*v2.x;
    const area=Math.abs(det);

    document.getElementById("detValue").innerHTML=
        "行列式 det(A) = "+det.toFixed(4);

    document.getElementById("absDetValue").innerHTML=
        "|det(A)| = "+area.toFixed(4);

    document.getElementById("areaValue").innerHTML=
        "平行四边形面积 = "+area.toFixed(4);

    if(Math.abs(det)<0.0001){
        document.getElementById("relation").innerHTML=
        "<span style='color:red'>向量线性相关（面积为0）</span>";
    }else{
        document.getElementById("relation").innerHTML=
        "|det(A)| = 面积 ✔";
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxes();
    drawParallelogram();
    drawVector(v1,"blue");
    drawVector(v2,"orange");
    updatePanel();
}

function selectVector(name){
    selected=name;
    document.getElementById("btn1").classList.remove("selected");
    document.getElementById("btn2").classList.remove("selected");
    document.getElementById(name==="v1"?"btn1":"btn2").classList.add("selected");
}

function resetVectors(){
    v1={x:1,y:0};
    v2={x:0,y:1};
    draw();
}

canvas.addEventListener("mousedown",startDrag);
canvas.addEventListener("mousemove",moveDrag);
canvas.addEventListener("mouseup",()=>dragging=null);
canvas.addEventListener("mouseleave",()=>dragging=null);

canvas.addEventListener("touchstart",startDrag);
canvas.addEventListener("touchmove",moveDrag);
canvas.addEventListener("touchend",()=>dragging=null);

function getPos(e){
    const rect=canvas.getBoundingClientRect();
    if(e.touches){
        return {x:e.touches[0].clientX-rect.left,
                y:e.touches[0].clientY-rect.top};
    }
    return {x:e.clientX-rect.left,
            y:e.clientY-rect.top};
}

function startDrag(e){
    const pos=getPos(e);
    if(dist(pos,toCanvas(v1))<15) dragging="v1";
    else if(dist(pos,toCanvas(v2))<15) dragging="v2";
    else{
        const v=fromCanvas(pos);
        if(selected==="v1"){v1=v;}
        else{v2=v;}
        draw();
    }
}

function moveDrag(e){
    if(!dragging) return;
    e.preventDefault();
    const pos=getPos(e);
    const v=fromCanvas(pos);
    if(dragging==="v1"){v1=v;}
    else{v2=v;}
    draw();
}

function dist(a,b){
    return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
}

document.querySelectorAll("input").forEach(input=>{
    input.addEventListener("change",()=>{
        v1.x=parseFloat(document.getElementById("v1x").value);
        v1.y=parseFloat(document.getElementById("v1y").value);
        v2.x=parseFloat(document.getElementById("v2x").value);
        v2.y=parseFloat(document.getElementById("v2y").value);
        draw();
    });
});

resize();
selectVector("v1");
</script>

</body>
</html>
